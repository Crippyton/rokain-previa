<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portais — Rokain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/pages/portais/src/css/portais.css" />
</head>
<body>

<!-- ═══════════════════════════════════════
     BACKGROUND GRID + GLOW
════════════════════════════════════════ -->
<div class="bg-grid"></div>
<div class="bg-glow bg-glow--1"></div>
<div class="bg-glow bg-glow--2"></div>
<div class="bg-glow bg-glow--3"></div>

<!-- ═══════════════════════════════════════
     HEADER
════════════════════════════════════════ -->
<header class="header">
  <div class="header__brand">
    <div class="header__logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="6" fill="var(--accent)"/>
        <text x="14" y="20" text-anchor="middle" font-family="Syne" font-weight="800" font-size="14" fill="#000">R</text>
      </svg>
    </div>
    <div class="header__brand-text">
      <span class="header__name">Portais</span>
      <span class="header__sub">Central de Ferramentas</span>
    </div>
  </div>

  <div class="header__center">
    <div class="search-wrap" id="searchWrap">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search-input" id="searchInput" type="text" placeholder="Buscar ferramenta, tag…" autocomplete="off" spellcheck="false" />
      <kbd class="search-kbd" id="searchKbd">/</kbd>
      <button class="search-clear" id="searchClear" aria-label="Limpar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
  </div>

  <div class="header__actions">
    <button class="btn-theme" id="themeToggle" title="Alternar tema">
      <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
  </div>
</header>

<!-- ═══════════════════════════════════════
     MAIN LAYOUT
════════════════════════════════════════ -->
<main class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar__section">
      <p class="sidebar__label">Categoria</p>
      <select class="select" id="categoryFilter">
        <option value="">Todas</option>
      </select>
    </div>

    <div class="sidebar__section">
      <p class="sidebar__label">Ordenar</p>
      <select class="select" id="sortFilter">
        <option value="favorites">Favoritos primeiro</option>
        <option value="name">Nome A–Z</option>
        <option value="recent">Recentes</option>
      </select>
    </div>

    <div class="sidebar__section">
      <label class="toggle-label">
        <div class="toggle" id="favToggleWrap">
          <input type="checkbox" id="favOnly" />
          <span class="toggle__track">
            <span class="toggle__thumb"></span>
          </span>
        </div>
        <span>Somente favoritos</span>
      </label>
    </div>

    <div class="sidebar__divider"></div>

    <div class="sidebar__stats" id="sidebarStats">
      <span class="stat" id="statVisible">0 visíveis</span>
      <span class="stat-sep">·</span>
      <span class="stat" id="statTotal">0 no total</span>
    </div>

    <div class="sidebar__divider"></div>

    <div class="sidebar__tips">
      <p class="sidebar__label">Atalhos</p>
      <ul class="tips-list">
        <li><kbd>/</kbd> Focar busca</li>
        <li><kbd>Esc</kbd> Limpar busca</li>
        <li><kbd>Enter</kbd> Abrir primeiro</li>
        <li><span class="tip-star">★</span> Favoritar card</li>
      </ul>
    </div>
  </aside>

  <!-- CONTENT -->
  <section class="content">
    <div class="content__header">
      <h1 class="content__title" id="contentTitle">Ferramentas</h1>
      <span class="content__badge" id="contentBadge">0</span>
    </div>

    <!-- EMPTY STATE -->
    <div class="empty-state" id="emptyState" style="display:none">
      <div class="empty-state__icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/><path d="M8 11h6M11 8v6"/></svg>
      </div>
      <p class="empty-state__title">Nenhuma ferramenta encontrada</p>
      <p class="empty-state__sub">Tente outro termo ou limpe os filtros</p>
      <button class="btn-outline" id="clearFiltersBtn">Limpar filtros</button>
    </div>

    <!-- GRID -->
    <div class="tools-grid" id="toolsGrid"></div>
  </section>

</main>

<!-- ═══════════════════════════════════════
     FOOTER
════════════════════════════════════════ -->
<footer class="footer">
  <span>© 2026 Rokain</span>
  <span class="footer-sep">·</span>
  <span>Central de Ferramentas</span>
</footer>

<!-- ═══════════════════════════════════════
     TOAST
════════════════════════════════════════ -->
<div class="toast" id="toast"></div>

<script src="/src/pages/portais/src/js/tools.js"></script>
<script src="/src/pages/portais/src/js/portais.js"></script>
</body>
</html>
