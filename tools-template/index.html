<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NOME_DA_FERRAMENTA — Rokain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    /* ── TOKENS (mesmos do portal) ── */
    :root {
      --bg:         #080b10;
      --bg-card:    #0d1117;
      --border:     rgba(255,255,255,0.07);
      --accent:     #00d4ff;
      --accent-dim: rgba(0,212,255,0.12);
      --accent-glow:rgba(0,212,255,0.35);
      --text-1:     #f0f4f8;
      --text-2:     #8b95a1;
      --text-3:     #4a5568;
      --radius:     12px;
      --header-h:   56px;
      --font-display:'Syne', sans-serif;
      --font-mono:   'Space Mono', monospace;
      --font-body:   'DM Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); background: var(--bg); color: var(--text-1); min-height: 100vh; }

    /* BG */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 0%,#000 60%,transparent 100%);
    }

    /* TOPBAR */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: var(--header-h);
      display: flex; align-items: center; gap: 12px; padding: 0 20px;
      background: rgba(8,11,16,0.9); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .topbar__back {
      display: flex; align-items: center; gap: 8px;
      color: var(--text-2); text-decoration: none; font-size: 13px;
      padding: 6px 10px; border-radius: 8px;
      border: 1px solid var(--border);
      transition: all 200ms;
    }
    .topbar__back:hover { color: var(--text-1); border-color: var(--accent); background: var(--accent-dim); }
    .topbar__title {
      font-family: var(--font-display); font-weight: 800; font-size: 15px;
      color: var(--text-1);
    }
    .topbar__category {
      font-family: var(--font-mono); font-size: 10px; text-transform: uppercase;
      color: var(--accent); padding: 2px 8px; border-radius: 20px;
      background: var(--accent-dim); border: 1px solid rgba(0,212,255,0.2);
    }

    /* TOOL CONTENT AREA */
    .tool-wrapper {
      padding-top: var(--header-h);
      min-height: 100vh;
      position: relative; z-index: 1;
    }
    .tool-content {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* ─── ESCREVA O CSS DA SUA FERRAMENTA ABAIXO ─── */
  </style>
</head>
<body>

<div class="bg-grid"></div>

<!-- TOPBAR COM VOLTAR -->
<div class="topbar">
  <a class="topbar__back" href="/portais/">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Portais
  </a>
  <span class="topbar__title">NOME_DA_FERRAMENTA</span>
  <span class="topbar__category">CATEGORIA</span>
</div>

<!-- CONTEÚDO DA FERRAMENTA -->
<div class="tool-wrapper">
  <div class="tool-content">

    <!-- ════════════════════════════════════════
         COLOQUE O HTML DA SUA FERRAMENTA AQUI
    ═════════════════════════════════════════ -->

    <h1>Olá, eu sou a ferramenta!</h1>
    <p>Substitua este conteúdo pelo HTML da sua ferramenta.</p>

  </div>
</div>

<script>
  // ─── ESCREVA O JS DA SUA FERRAMENTA AQUI ───
</script>
</body>
</html>
